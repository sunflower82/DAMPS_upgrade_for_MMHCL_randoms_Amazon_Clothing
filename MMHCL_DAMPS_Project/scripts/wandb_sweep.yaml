# =============================================================================
# wandb_sweep.yaml -- Bayesian sweep over (K, lambda_coh)
# =============================================================================
# Implements Section 7 of the DAMPS-MMHCL Speedup Guide. Sweeps the two
# architectural hyperparameters that are NOT frozen by Section 4 of the
# Revision 9 specification (everything else is locked).
#
# Run via:
#   wandb sweep MMHCL_DAMPS_Project/scripts/wandb_sweep.yaml
#   wandb agent <returned_sweep_id>
# =============================================================================

program: train.py
project: damps-mmhcl-clothing
method: bayes

metric:
  name: val/recall@20
  goal: maximize

parameters:
  topk:
    distribution: int_uniform
    min: 3
    max: 20
  # NB: --rebuild_R, --damps_warmup_epochs, --damps_data_driven_prior, etc.
  # are anchored at the spec defaults and are NOT swept here.
  rebuild_R:
    value: 5
  damps_warmup_epochs:
    value: 10
  damps_data_driven_prior:
    value: 1
  use_amp:
    value: 1
  use_torch_compile:
    value: 1

  # The IMCF residual coefficient lambda_coh is a learnable nn.Parameter,
  # so the sweep instead tunes its INITIAL VALUE (passed through an env
  # var that the trainer can pick up; see scripts/run_wandb_sweep.py for
  # the env-var indirection). The actual init lives in damps/core.py
  # (default 0.1 per the spec).

early_terminate:
  type: hyperband
  min_iter: 30
  max_iter: 250
  eta: 3
